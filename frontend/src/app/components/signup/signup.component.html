<section class="page-shell">
  <div class="page-hero">
    <span class="eyebrow">Join Curio</span>
    <h2>Create your account</h2>
    <p>Sign up once, then only you can create and delete your own prompts while everyone can still browse them.</p>
  </div>

  <form (ngSubmit)="submit()" [formGroup]="form" class="form-card auth-card">
    <label for="signup-username">Username</label>
    <input id="signup-username" formControlName="username" placeholder="Choose a username" />

    <label for="signup-password">Password</label>
    <input id="signup-password" type="password" formControlName="password" placeholder="Create a password" />

    <p class="form-error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <button type="submit" [disabled]="isSubmitting">
      {{ isSubmitting ? 'Creating...' : 'Sign up' }}
    </button>

    <p class="auth-switch">
      Already have an account?
      <a routerLink="/login">Login</a>
    </p>
  </form>
</section>
